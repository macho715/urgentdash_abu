function Bar({value,max=1,color,h=8}){

}

function Gauge({value,color,label,sub}){
  const p=Math.min(value,1),a=p*180,r=35,cx=45,cy=50;
  const rad=d=>(d*Math.PI)/180;
  const ea=180-a,x2=cx+r*Math.cos(rad(ea)),y2=cy-r*Math.sin(rad(ea));
  return <div style={{textAlign:"center"}}>
    <svg width={90} height={65} viewBox="0 0 90 65">
      <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`} fill="none" stroke="#1e293b" strokeWidth={5} strokeLinecap="round"/>
      {p>0&&<path d={`M ${cx-r} ${cy} A ${r} ${r} 0 ${a>180?1:0} 1 ${x2} ${y2}`} fill="none" stroke={color} strokeWidth={5} strokeLinecap="round"/>}
      <text x={cx} y={cy-8} textAnchor="middle" fill={color} fontSize={16} fontWeight={800} fontFamily="monospace">{value.toFixed(3)}</text>
      <text x={cx} y={cy+6} textAnchor="middle" fill="#94a3b8" fontSize={9}>{label}</text>
    </svg>
    {sub&&<div style={{fontSize:10,color:"#64748b",marginTop:-4}}>{sub}</div>}
  </div>;
}

      <div style={{background:"#0f172a",border:"1px solid #334155",borderRadius:12,padding:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",marginBottom:12,letterSpacing:1}}>📈 가능성 (LIKELIHOOD)</div>
        <div style={{textAlign:"center",padding:"8px 0 12px"}}><div style={{fontSize:28,fontWeight:800,color:"#f59e0b"}}>LIKELY</div><div style={{fontSize:13,color:"#94a3b8"}}>55–80%</div></div>
        <div style={{background:"#1e293b",borderRadius:8,padding:12,fontSize:12,color:"#cbd5e1",lineHeight:1.6}}>"아부다비 거주자가 72시간 내 대피 준비가 필요할 가능성이 높다."</div>
        <div style={{background:"rgba(245,158,11,0.08)",borderRadius:8,padding:10,marginTop:8,fontSize:11,color:"#fbbf24"}}>근거: US Ordered Departure + UK/AU DNT + 이란 3일 연속 공격</div>
      </div>

      {/* Escalation */}
      <div style={{background:"#0f172a",border:"1px solid #ef4444",borderRadius:12,padding:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",marginBottom:12}}>🔺 RED 전환 지표</div>
        {["한국 대사관 'Leave immediately'","미국 Level 4 Do Not Travel 격상","Al Ain 국경 혼잡도 RESTRICTED↑","ΔScore ≥ 0.20 돌파 (현재 0.01 차이)","이란 추가 대규모 보복"].map((t,i)=>
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:11,marginBottom:5}}><span style={{color:"#ef4444"}}>▲</span><span style={{color:"#fca5a5"}}>{t}</span></div>
        )}
      </div>

      {/* De-escalation */}
      <div style={{background:"#0f172a",border:"1px solid #22c55e",borderRadius:12,padding:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",marginBottom:12}}>🔽 GREEN 전환 지표</div>
        {["영공 재개 + Etihad 상업 운항 재개","Stay-indoors 해제 + strike 종료","이란-미국 휴전/협상 개시","주요 정부 'situation stabilizing'"].map((t,i)=>
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:11,marginBottom:5}}><span style={{color:"#22c55e"}}>▼</span><span style={{color:"#86efac"}}>{t}</span></div>
        )}
      </div>
    </div>}

    {/* INTEL FEED */}
    {tab==="intel"&&<div>
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {["ALL","CRITICAL","HIGH","MEDIUM"].map(f=><button key={f} onClick={()=>sFF(f)} style={{background:ff===f?(pC[f]||"#334155"):"transparent",border:`1px solid ${ff===f?(pC[f]||"#334155"):"#1e293b"}`,borderRadius:6,padding:"4px 12px",fontSize:11,fontWeight:600,color:ff===f?"#fff":"#64748b",cursor:"pointer"}}>{f} {f!=="ALL"&&`(${INTEL_FEED.filter(i=>i.priority===f).length})`}</button>)}
      </div>
      {fFeed.map((item,i)=>
        <div key={i} style={{background:"#0f172a",border:`1px solid ${item.priority==="CRITICAL"?"#7f1d1d":"#1e293b"}`,borderLeft:`3px solid ${pC[item.priority]}`,borderRadius:8,padding:"10px 14px",marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:9,padding:"1px 6px",borderRadius:4,fontWeight:700,background:`${pC[item.priority]}20`,color:pC[item.priority]}}>{item.priority}</span>
              <span style={{fontSize:10,color:"#64748b",fontFamily:"monospace"}}>{item.ts} GST</span>
            </div>
            {item.verified&&<span style={{fontSize:9,color:"#22c55e"}}>✓ verified</span>}
          </div>
          <div style={{fontSize:12,color:"#e2e8f0",fontWeight:600,marginBottom:4}}>{item.text}</div>
          <div style={{fontSize:10,color:"#64748b",marginBottom:2}}>출처: {item.src}</div>
          <div style={{fontSize:10,color:"#94a3b8",fontStyle:"italic"}}>영향: {item.impact}</div>
        </div>
      )}
    </div>}

    {/* INDICATORS */}
    {tab==="indicators"&&<div>
      {INDICATORS.map(ind=>
        <div key={ind.id} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,padding:"12px 16px",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <div style={{minWidth:40,textAlign:"center",fontSize:12,fontWeight:800,fontFamily:"monospace",color:ind.state>=0.8?"#ef4444":ind.state>=0.4?"#f59e0b":"#22c55e"}}>{ind.id}</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>{ind.name}</span>
                <span style={{fontSize:9,padding:"1px 6px",borderRadius:4,fontWeight:700,background:ind.tier==="TIER0"?"rgba(239,68,68,0.15)":ind.tier==="TIER1"?"rgba(245,158,11,0.15)":"rgba(100,116,139,0.15)",color:ind.tier==="TIER0"?"#fca5a5":ind.tier==="TIER1"?"#fcd34d":"#94a3b8"}}>{ind.tier}</span>
                <span style={{fontSize:12,fontWeight:800,fontFamily:"monospace",color:ind.state>=0.8?"#ef4444":ind.state>=0.4?"#f59e0b":"#22c55e"}}>{ind.state.toFixed(2)}</span>
              </div>
            </div>
            <span style={{fontSize:10,color:ind.cv?"#22c55e":"#f59e0b"}}>{ind.cv?"✓ 교차검증":"△ 부분"}</span>
          </div>
          <Bar value={ind.state} color={ind.state>=0.8?"#ef4444":ind.state>=0.4?"#f59e0b":"#22c55e"} h={6}/>
          <div style={{fontSize:11,color:"#cbd5e1",marginTop:6}}>{ind.detail}</div>
          <div style={{fontSize:10,color:"#64748b",marginTop:4}}>출처: {ind.src} · 최신: {ind.ts} · 소스 {ind.srcCount}건</div>
        </div>
      )}
      <div style={{background:"#0f172a",border:"1px solid #334155",borderRadius:10,padding:14,marginTop:4}}>
        <div style={{fontSize:12,fontWeight:700,color:"#22c55e"}}>✅ Evidence Floor PASSED — TIER0 confirmed: 3건 (I01, I02, I07)</div>
      </div>
    </div>}

    {/* ROUTES */}
    {tab==="routes"&&<div>
      {ROUTES.map(r=>{
        const eff=r.base_h*(1+r.cong)*bf;
        return <div key={r.id} style={{background:"#0f172a",border:`1px solid ${r.status==="CAUTION"?"#92400e":"#1e293b"}`,borderRadius:10,padding:16,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",background:r.status==="CAUTION"?"#92400e":"#14532d",fontSize:13,fontWeight:800,color:"#fff"}}>{r.id}</span>
              <div><div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{r.name}</div><div style={{fontSize:10,color:r.status==="CAUTION"?"#f59e0b":"#22c55e"}}>{r.status}</div></div>
            </div>
            <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:800,fontFamily:"monospace",color:"#e2e8f0"}}>{eff.toFixed(1)}h</div><div style={{fontSize:10,color:"#64748b"}}>effective lead</div></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
            <div style={{background:"#1e293b",borderRadius:6,padding:8,textAlign:"center"}}><div style={{fontSize:10,color:"#64748b"}}>Base</div><div style={{fontSize:14,fontWeight:700,fontFamily:"monospace",color:"#94a3b8"}}>{r.base_h}h</div></div>
            <div style={{background:"#1e293b",borderRadius:6,padding:8,textAlign:"center"}}><div style={{fontSize:10,color:"#64748b"}}>Congestion</div><div style={{fontSize:14,fontWeight:700,fontFamily:"monospace",color:r.cong>0.3?"#f59e0b":"#94a3b8"}}>x{(1+r.cong).toFixed(2)}</div></div>
            <div style={{background:"#1e293b",borderRadius:6,padding:8,textAlign:"center"}}><div style={{fontSize:10,color:"#64748b"}}>Buffer</div><div style={{fontSize:14,fontWeight:700,fontFamily:"monospace",color:"#f59e0b"}}>x{bf.toFixed(1)}</div></div>
          </div>
          <div style={{fontSize:10,color:"#94a3b8",background:"#0d1117",borderRadius:6,padding:8}}>{r.note}</div>
        </div>
      })}
    </div>}

    {/* CHECKLIST */}
    {tab==="checklist"&&<div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>SHELTER 모드 — 즉시 준비</div><div style={{fontSize:12,color:cc===cl.length?"#22c55e":"#f59e0b"}}>{cc}/{cl.length}</div></div>
      <Bar value={cc} max={cl.length} color={cc===cl.length?"#22c55e":"#f59e0b"} h={6}/>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:12}}>
        {cl.map(c=><div key={c.id} onClick={()=>tog(c.id)} style={{display:"flex",alignItems:"center",gap:12,background:c.done?"rgba(34,197,94,0.05)":"#0f172a",border:`1px solid ${c.done?"#14532d":"#1e293b"}`,borderRadius:8,padding:"10px 14px",cursor:"pointer"}}>
          <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${c.done?"#22c55e":"#334155"}`,display:"flex",alignItems:"center",justifyContent:"center",background:c.done?"#22c55e":"transparent"}}>{c.done&&<span style={{color:"#000",fontSize:12,fontWeight:800}}>✓</span>}</div>
          <span style={{fontSize:13,color:c.done?"#86efac":"#e2e8f0",textDecoration:c.done?"line-through":"none",opacity:c.done?0.7:1}}>{c.text}</span>
        </div>)}
      </div>
    </div>}

    {/* FOOTER */}
    <div style={{marginTop:16,padding:"10px 16px",background:"#0f172a",borderRadius:10,border:"1px solid #1e293b",fontSize:10,color:"#475569"}}>
      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
        <span>HyIE-ERC² v2026.05 · ICD 203 · Samsung C&T Logistics</span>
        <span>경보 시점 = 출구 상실 시점 − (대피 소요 × 버퍼)</span>
      </div>
      <div style={{marginTop:6,color:"#334155",fontSize:9}}>Sources: Al Jazeera, CNN, BBC, CNBC, Reuters, Euronews, Khaleej Times, The National, Gulf News, US State Dept, NL Gov, UAE MoD</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
