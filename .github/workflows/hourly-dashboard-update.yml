name: dashboard-refresh-30m

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run scraper
        run: node scripts/update-dashboard.mjs

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "urgentdash-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/dashboard.json
          if (! git diff --cached --quiet); then
            git commit -m "chore: 30m dashboard scrape refresh"
            git push origin HEAD:${{ github.ref_name }}
          fi
